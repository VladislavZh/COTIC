_target_: src.models.base_model.BaseEventModule

net:
  _target_: src.models.components.baselines.thp.Transformer
  num_types: 5
  d_model: 256
  d_rnn: 128
  d_inner: 1024
  n_layers: 4
  n_head: 4
  d_k: 64
  d_v: 64
  dropout: 0.1
  rnn: True
metrics:
  _target_: src.metrics.cont_cnn.CCNNMetrics
  return_time_metric:
    _target_: src.utils.metrics.MAE
  event_type_metric:
    _target_: src.utils.metrics.Accuracy
  type_loss_coeff: 1
  time_loss_coeff: 10
  reductions:
    log_likelihood: sum
    type: sum
    time: mean
  sim_size: 100
optimizer:
  name: adam
  params:
    lr: 0.001
    weight_decay: 1e-5
scheduler:
  step: null
  milestones: null
  gamma: 0.1
head_start: 1
